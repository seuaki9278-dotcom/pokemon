<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>포켓몬 키우기</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Malgun Gothic','Apple SD Gothic Neo',sans-serif;background:#0a0a1a;min-height:100vh;display:flex;justify-content:center;padding:16px;color:#e6edf3}
#app{width:100%;max-width:420px}
.panel{background:linear-gradient(145deg,#1a1a2e,#16213e);border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:20px;margin-bottom:10px}
/* 로드 */
#load-screen{text-align:center;display:none}
.gtitle{font-size:26px;font-weight:900;color:#FFD700;text-shadow:0 0 20px rgba(255,215,0,.5);margin-bottom:4px}
.lsavebox{background:rgba(255,215,0,.08);border:1px solid rgba(255,215,0,.25);border-radius:14px;padding:16px;margin:20px 0}
.lsavename{font-size:18px;font-weight:bold;color:#fff;margin-bottom:4px}
.lsaveinfo{font-size:12px;color:#888}
.lbtns{display:flex;gap:10px}
.lbtn{flex:1;border:none;border-radius:12px;padding:13px;font-size:13px;font-weight:bold;cursor:pointer;transition:all .15s}
.lbtn-c{background:linear-gradient(135deg,#FFD700,#FF8C00);color:#000}
.lbtn-n{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);color:#aaa}
.lbtn-n:hover{color:#fff;background:rgba(255,255,255,.14)}
/* 스타터 */
#starter-screen{text-align:center;display:none}
.gsub{font-size:12px;color:#666;margin-bottom:26px}
.starter-grid{display:flex;gap:10px;justify-content:center}
.sc{flex:1;background:rgba(255,255,255,.05);border:2px solid rgba(255,255,255,.1);border-radius:16px;padding:16px 8px;cursor:pointer;transition:all .2s;text-align:center}
.sc:hover{transform:translateY(-6px);border-color:#FFD700;background:rgba(255,215,0,.1);box-shadow:0 12px 30px rgba(255,215,0,.25)}
.sc img{width:76px;height:76px;image-rendering:pixelated;display:block;margin:0 auto}
.sc .sname{font-weight:bold;font-size:13px;color:#fff;margin-top:6px}
.sc .stype{font-size:10px;margin-top:4px;padding:2px 8px;border-radius:99px;display:inline-block}
.tg{background:rgba(34,197,94,.2);color:#4ade80}.tf{background:rgba(239,68,68,.2);color:#f87171}.tw{background:rgba(59,130,246,.2);color:#60a5fa}
/* 메인 */
#game-screen{display:none}
.hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.pname{font-size:18px;font-weight:900;color:#FFD700}
.hright{display:flex;gap:5px;align-items:center}
.lvbadge{background:linear-gradient(135deg,#FFD700,#FF8C00);color:#000;font-weight:900;font-size:11px;padding:4px 11px;border-radius:99px}
.coinbadge{background:rgba(255,215,0,.12);border:1px solid rgba(255,215,0,.3);color:#FFD700;font-size:12px;font-weight:bold;padding:4px 9px;border-radius:99px}
.rbtn{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:99px;color:#666;font-size:11px;padding:4px 9px;cursor:pointer}
.rbtn:hover{color:#f87171;border-color:rgba(248,113,113,.4)}
.exprow{display:flex;align-items:center;gap:8px;margin-bottom:14px}
.explbl{font-size:10px;color:#555;width:24px}
.barbg{flex:1;height:6px;background:rgba(255,255,255,.07);border-radius:99px;overflow:hidden}
.barfill{height:100%;border-radius:99px;transition:width .6s cubic-bezier(.34,1.56,.64,1)}
.fexp{background:linear-gradient(90deg,#a78bfa,#7c3aed)}
.expval{font-size:10px;color:#555;width:55px;text-align:right}
/* 포켓몬 */
.pstage{text-align:center;padding:8px 0;position:relative}
.pbg{display:inline-block;padding:20px;background:radial-gradient(circle,rgba(255,215,0,.08) 0%,transparent 70%);border-radius:50%;cursor:pointer;position:relative}
#poke-sprite{width:128px;height:128px;image-rendering:pixelated;display:block;position:relative;z-index:1}
#poke-sprite.hungry{filter:sepia(.6);animation:wobble 1s ease infinite}
#poke-sprite.tired{filter:brightness(.65)}
@keyframes wobble{0%,100%{transform:rotate(-4deg)}50%{transform:rotate(4deg)}}
.tap-ring{position:absolute;inset:0;border-radius:50%;border:3px solid transparent;pointer-events:none;transition:all .2s}
.tap-ring.on{border-color:#FFD700;box-shadow:0 0 22px rgba(255,215,0,.5)}
.combo-badge{position:absolute;top:-4px;right:-8px;background:linear-gradient(135deg,#f97316,#ef4444);color:#fff;font-weight:900;font-size:11px;padding:3px 8px;border-radius:99px;opacity:0;transform:scale(.5);transition:all .2s}
.combo-badge.show{opacity:1;transform:scale(1)}
.mood-text{font-size:13px;color:#aaa;margin-top:8px;min-height:20px}
.streak-line{font-size:12px;color:#f97316;font-weight:bold;margin-top:4px;display:none}
.tap-hint{font-size:11px;color:#555;margin-top:4px}
.tapbar-bg{height:6px;background:rgba(255,255,255,.07);border-radius:99px;overflow:hidden;margin:6px 0;opacity:0;transition:opacity .2s}
.tapbar-bg.on{opacity:1}
.tapbar-fill{height:100%;background:linear-gradient(90deg,#FFD700,#FF8C00);border-radius:99px;width:0%}
/* 스탯 */
.stats{display:flex;flex-direction:column;gap:9px}
.srow{display:flex;align-items:center;gap:8px}
.sico{font-size:14px;width:18px}.slbl{font-size:11px;color:#777;width:38px}
.sbarbg{flex:1;height:10px;background:rgba(255,255,255,.07);border-radius:99px;overflow:hidden}
.sbarfill{height:100%;border-radius:99px;transition:width .5s ease}
.sval{font-size:11px;color:#999;width:28px;text-align:right}
.fhunger{background:linear-gradient(90deg,#f97316,#ef4444)}.fhappy{background:linear-gradient(90deg,#facc15,#f59e0b)}
.fenergy{background:linear-gradient(90deg,#34d399,#10b981)}.fbond{background:linear-gradient(90deg,#f472b6,#ec4899)}
.sbarfill.warn{animation:pwarn 1s ease infinite}
@keyframes pwarn{0%,100%{opacity:1}50%{opacity:.3}}
/* 행동 */
.agrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.abtn{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:14px;padding:14px 8px;cursor:pointer;transition:all .15s;color:#fff;text-align:center}
.abtn:hover:not(:disabled){transform:translateY(-2px)}.abtn:active:not(:disabled){transform:scale(.95)}.abtn:disabled{opacity:.3;cursor:not-allowed}
.aico{font-size:26px;display:block;margin-bottom:4px}.albl{font-size:12px;font-weight:bold}.adsc{font-size:10px;color:#666;margin-top:2px}
.af:hover:not(:disabled){border-color:#f97316;background:rgba(249,115,22,.1)}
.ap:hover:not(:disabled){border-color:#facc15;background:rgba(250,204,21,.1)}
.at:hover:not(:disabled){border-color:#6366f1;background:rgba(99,102,241,.1)}
.as:hover:not(:disabled){border-color:#34d399;background:rgba(52,211,153,.1)}
/* 하단 버튼 3개 */
.bgrid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.bbtn{border:none;border-radius:14px;padding:12px 6px;font-size:12px;font-weight:bold;cursor:pointer;transition:all .2s;color:#fff}
.bbattle{background:linear-gradient(135deg,#7c3aed,#4f46e5);box-shadow:0 4px 15px rgba(124,58,237,.3)}
.bbattle:hover{transform:translateY(-2px)}
.bshop{background:linear-gradient(135deg,#f59e0b,#d97706)}
.bshop:hover{transform:translateY(-2px)}
.bdex{background:linear-gradient(135deg,#059669,#047857)}
.bdex:hover{transform:translateY(-2px)}
/* 미니게임 버튼 */
.mgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.mbtn{border:none;border-radius:14px;padding:12px 6px;font-size:12px;font-weight:bold;cursor:pointer;color:#fff;transition:all .2s;text-align:center}
.mbtn:hover{transform:translateY(-2px)}
.mg1{background:linear-gradient(135deg,#0ea5e9,#0284c7)}
.mg2{background:linear-gradient(135deg,#8b5cf6,#6d28d9)}
/* 파티 */
.party-scroll{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px}
.party-card{flex:0 0 74px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:8px 4px;text-align:center}
.party-card img{width:52px;height:52px;image-rendering:pixelated;display:block;margin:0 auto}
.party-card .pcname{font-size:10px;color:#ccc;margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.party-card .pcsk{font-size:9px;color:#666;margin-top:2px}
.party-label{font-size:12px;color:#888;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between}
.ball-badge{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.15);border-radius:99px;font-size:10px;padding:2px 8px;color:#aaa}
/* 로그 */
.logbox{background:rgba(0,0,0,.3);border-radius:12px;padding:12px;min-height:52px;max-height:70px;overflow-y:auto;font-size:12px;color:#888;line-height:1.7}
.logbox p:last-child{color:#e6edf3}
.brow{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.bchip{font-size:10px;padding:2px 8px;border-radius:99px;border:1px solid rgba(255,255,255,.1);color:#555}
.bchip.on{border-color:#FFD700;color:#FFD700;background:rgba(255,215,0,.08)}
/* 모달 */
.moverlay{position:fixed;inset:0;background:rgba(0,0,0,.82);display:none;justify-content:center;align-items:center;z-index:100;backdrop-filter:blur(6px)}
.moverlay.open{display:flex}
.mbox{background:linear-gradient(145deg,#1a1a2e,#16213e);border:1px solid rgba(255,255,255,.15);border-radius:20px;padding:24px;width:360px;max-width:95vw;position:relative;overflow:hidden}
.mtitle{font-size:16px;font-weight:900;color:#FFD700;margin-bottom:16px;text-align:center;position:relative;z-index:3}
/* 배틀 */
#b-flash{position:absolute;inset:0;opacity:0;pointer-events:none;z-index:2;transition:opacity .12s;border-radius:20px}
.bfield{display:flex;justify-content:space-around;align-items:flex-end;min-height:130px;margin-bottom:14px;position:relative;z-index:3}
.bfighter{text-align:center}
.bfighter img{width:80px;height:80px;image-rendering:pixelated}
.bfighter .fn{font-size:11px;color:#ccc;margin-top:4px}
.bhpbg{height:7px;background:rgba(255,255,255,.1);border-radius:99px;overflow:hidden;width:80px;margin-top:5px}
.bhpfill{height:100%;border-radius:99px;background:linear-gradient(90deg,#34d399,#10b981);transition:width .5s ease}
.bhpfill.low{background:linear-gradient(90deg,#f97316,#ef4444)}
.vsbadge{font-size:22px;font-weight:900;color:rgba(255,255,255,.25);align-self:center}
.blog{background:rgba(0,0,0,.3);border-radius:10px;padding:10px 12px;font-size:12px;color:#ccc;min-height:44px;margin-bottom:10px;line-height:1.6;white-space:pre-line;position:relative;z-index:3}
.bbtns{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px;position:relative;z-index:3}
.bact{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.14);border-radius:10px;padding:10px 4px;color:#fff;font-size:11px;font-weight:bold;cursor:pointer;transition:all .15s;text-align:center}
.bact:hover:not(:disabled){background:rgba(255,255,255,.14)}.bact:disabled{opacity:.3;cursor:not-allowed}
.bact-catch{border-color:rgba(255,100,100,.4);color:#fca5a5}
.bact-catch:hover:not(:disabled){background:rgba(255,100,100,.1)}
/* 기술 패널 */
.skill-panel{display:none;margin-bottom:8px;position:relative;z-index:3}
.skill-panel.open{display:block}
.sptitle{font-size:11px;color:#888;margin-bottom:6px;display:flex;justify-content:space-between}
.sptitle button{background:none;border:none;color:#555;font-size:12px;cursor:pointer}
.sptitle button:hover{color:#fff}
.skill-list{display:flex;flex-direction:column;gap:5px;max-height:150px;overflow-y:auto}
.skill-item{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:9px;padding:7px 10px;cursor:pointer;transition:all .15s}
.skill-item:hover:not(.used){background:rgba(255,255,255,.12)}
.skill-item.used{opacity:.3;cursor:not-allowed;pointer-events:none}
.skill-item img{width:32px;height:32px;image-rendering:pixelated;flex-shrink:0}
.skill-info{flex:1;min-width:0}.skill-from{font-size:9px;color:#666}.skill-name{font-size:12px;font-weight:bold}
.pow-badge{font-size:10px;font-weight:bold;padding:2px 7px;border-radius:99px;flex-shrink:0}
.pw{background:rgba(156,163,175,.2);color:#9ca3af}.pn{background:rgba(96,165,250,.2);color:#60a5fa}
.ps{background:rgba(249,115,22,.2);color:#fb923c}.pm{background:rgba(234,179,8,.2);color:#FFD700}
.mclose{width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:10px;padding:10px;color:#777;font-size:12px;cursor:pointer;position:relative;z-index:3}
.mclose:hover{background:rgba(255,255,255,.12);color:#fff}
/* 배틀 애니메이션 */
@keyframes myAtk{0%{transform:translateX(0) scale(1)}35%{transform:translateX(42px) scale(1.15)}65%{transform:translateX(26px) scale(.95)}100%{transform:translateX(0) scale(1)}}
@keyframes enAtk{0%{transform:translateX(0) scale(1)}35%{transform:translateX(-42px) scale(1.15)}65%{transform:translateX(-26px) scale(.95)}100%{transform:translateX(0) scale(1)}}
@keyframes fxBoom{0%{opacity:0;transform:translate(-50%,-50%) scale(.2)}35%{opacity:1;transform:translate(-50%,-50%) scale(1.6)}65%{opacity:.85;transform:translate(-50%,-50%) scale(1.2)}100%{opacity:0;transform:translate(-50%,-50%) scale(2.2)}}
@keyframes hitRed{0%,100%{filter:brightness(1)}30%{filter:brightness(3) saturate(0)}55%{filter:brightness(.5) saturate(3) hue-rotate(160deg)}}
.my-atk{animation:myAtk .55s ease !important}.en-atk{animation:enAtk .55s ease !important}.hit-red{animation:hitRed .45s ease !important}
@keyframes winflash{0%,100%{filter:brightness(1)}50%{filter:brightness(2) saturate(2)}}
.winflash{animation:winflash .3s ease 3}
/* 포획 */
.catch-overlay{position:fixed;inset:0;display:none;justify-content:center;align-items:center;flex-direction:column;gap:14px;z-index:150;background:rgba(0,0,0,.85)}
.catch-overlay.open{display:flex;animation:cfade 3s ease forwards}
@keyframes cfade{0%{opacity:0}10%{opacity:1}80%{opacity:1}100%{opacity:0}}
.catch-ball{font-size:80px;animation:cbounce 3s ease}
@keyframes cbounce{0%{transform:translateY(-30px) scale(1.2)}20%{transform:translateY(0) scale(.9)}40%{transform:translateY(-10px)}55%{transform:translateY(0)}100%{transform:scale(1.05)}}
.catch-text{font-size:22px;font-weight:900;color:#FFD700;text-shadow:0 0 20px rgba(255,215,0,.6)}
.catch-subtext{font-size:12px;color:#ccc;text-align:center}
/* 상점 */
.shoplist{display:flex;flex-direction:column;gap:8px;margin-bottom:14px}
.sitem{display:flex;align-items:center;gap:12px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:12px;cursor:pointer;transition:all .15s}
.sitem:hover{border-color:rgba(255,215,0,.4);background:rgba(255,215,0,.06)}
.sitem.cant{opacity:.3;cursor:not-allowed;pointer-events:none}
.sico2{font-size:28px}.sinfo{flex:1}.sn{font-size:13px;font-weight:bold}.sd{font-size:10px;color:#666;margin-top:2px}.sp{font-size:12px;font-weight:bold;color:#FFD700}
/* 이벤트 */
.ebox{text-align:center}.eico{font-size:60px;display:block;margin-bottom:12px}
.etitle{font-size:16px;font-weight:900;color:#FFD700;margin-bottom:6px}
.edesc{font-size:13px;color:#ccc;margin-bottom:18px;line-height:1.6}
.econfirm{width:100%;background:linear-gradient(135deg,#FFD700,#FF8C00);border:none;border-radius:12px;padding:13px;color:#000;font-size:14px;font-weight:900;cursor:pointer}
/* 진화 */
#evolve-overlay{position:fixed;inset:0;display:none;justify-content:center;align-items:center;flex-direction:column;gap:20px;z-index:200}
#evolve-overlay.open{display:flex;animation:evolveAnim 3.2s ease forwards}
@keyframes evolveAnim{0%{background:rgba(255,255,255,0)}15%{background:rgba(255,255,255,.97)}45%{background:rgba(255,255,255,.6)}75%{background:rgba(255,255,255,.9)}100%{background:rgba(255,255,255,0)}}
#evolve-newsprite{width:150px;height:150px;image-rendering:pixelated;animation:evoSprite 3.2s ease}
@keyframes evoSprite{0%{opacity:0;transform:scale(0) rotate(-180deg)}20%{opacity:0}45%{opacity:1;transform:scale(1.4) rotate(10deg)}75%{transform:scale(1) rotate(-3deg)}100%{transform:scale(1.1) rotate(0)}}
#evolve-label{font-size:26px;font-weight:900;color:#7c3aed;animation:evoLabel 3.2s ease}
@keyframes evoLabel{0%,28%{opacity:0;transform:translateY(20px)}45%{opacity:1;transform:translateY(0)}90%{opacity:1}100%{opacity:0}}
/* 도감 */
.dex-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;max-height:340px;overflow-y:auto;margin-bottom:14px}
.dex-card{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:8px 4px;text-align:center}
.dex-card.caught{border-color:rgba(255,215,0,.35);background:rgba(255,215,0,.06)}
.dex-card img{width:44px;height:44px;image-rendering:pixelated;display:block;margin:0 auto}
.dex-card.uncaught img{filter:brightness(0)}
.dex-card .dname{font-size:9px;color:#ccc;margin-top:3px}
.dex-card.uncaught .dname{color:#444}
.dex-stat{font-size:11px;color:#888;margin-bottom:12px;text-align:center}
/* 미니게임 - 두더지 잡기 */
.mole-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:10px 0}
.mole-hole{background:rgba(0,0,0,.4);border:2px solid rgba(255,255,255,.1);border-radius:12px;height:70px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:36px;transition:all .1s;user-select:none}
.mole-hole:active{transform:scale(.93)}
.mole-hole.pop{border-color:#FFD700;background:rgba(255,215,0,.1)}
.mg-score{text-align:center;font-size:20px;font-weight:900;color:#FFD700;margin:8px 0}
.mg-timer{text-align:center;font-size:12px;color:#888;margin-bottom:10px}
.mg-result{text-align:center;font-size:14px;color:#ccc;margin:10px 0}
/* 미니게임 - 기억력 */
.mem-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin:10px 0}
.mem-card{background:rgba(255,255,255,.08);border:2px solid rgba(255,255,255,.1);border-radius:10px;height:58px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:24px;transition:all .2s;user-select:none}
.mem-card.flip{border-color:rgba(255,215,0,.5);background:rgba(255,215,0,.1)}
.mem-card.matched{border-color:rgba(52,211,153,.5);background:rgba(52,211,153,.1);cursor:default}
.mem-card.hidden span{display:none}
.mg-info{display:flex;justify-content:space-between;font-size:12px;color:#888;margin-bottom:8px}
/* 플로팅/토스트 */
.floatnum{position:fixed;font-size:15px;font-weight:900;pointer-events:none;z-index:500;animation:floatup 1.2s ease forwards}
@keyframes floatup{0%{opacity:1;transform:translateY(0) scale(1)}80%{opacity:1;transform:translateY(-45px) scale(1.2)}100%{opacity:0;transform:translateY(-65px) scale(.8)}}
#toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-70px);background:rgba(20,20,40,.95);border:1px solid rgba(255,215,0,.3);border-radius:12px;padding:10px 20px;font-size:13px;font-weight:bold;color:#FFD700;z-index:400;transition:transform .3s cubic-bezier(.34,1.56,.64,1);white-space:nowrap}
#toast.show{transform:translateX(-50%) translateY(0)}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:2px}
</style>
</head>
<body>
<div id="app">

<!-- 로드 화면 -->
<div id="load-screen" class="panel">
  <div class="gtitle">⚡ 포켓몬 키우기</div>
  <div class="lsavebox"><div class="lsavename" id="lsave-name"></div><div class="lsaveinfo" id="lsave-info"></div></div>
  <div class="lbtns">
    <button class="lbtn lbtn-c" onclick="loadGame()">▶ 이어하기</button>
    <button class="lbtn lbtn-n" onclick="showStarter()">새로 시작</button>
  </div>
</div>

<!-- 스타터 -->
<div id="starter-screen" class="panel">
  <div class="gtitle">⚡ 포켓몬 키우기</div>
  <div class="gsub">파트너를 선택하세요!</div>
  <div class="starter-grid">
    <div class="sc" onclick="choosePokemon('bulbasaur')">

// ══════════ SAVE ══════════
const SAVE_KEY='poke_v3';
function saveGame(){
  if(!G)return;

}
function hasSave(){return!!localStorage.getItem(SAVE_KEY)}
function parseSave(){
  const raw=localStorage.getItem(SAVE_KEY);if(!raw)return null;
  const d=JSON.parse(raw);d.G.seen=new Set(d.G.seen||[]);return d;
}
function loadGame(){
  const d=parseSave();if(!d)return;

}

function restart(){
  clearInterval(decayIv);clearInterval(eventIv);G=null;earnedBadges=new Set();

  document.getElementById('game-screen').style.display='none';
  document.getElementById('starter-screen').style.display='block';
}

// ══════════ AUDIO ══════════
let actx=null;
function ac(){if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)();return actx}
function sfx(type){
  try{
    const ctx=ac(),now=ctx.currentTime;
    const b=(f,t,d,w='sine',v=0.12)=>{const o=ctx.createOscillator(),g=ctx.createGain();o.type=w;o.frequency.value=f;g.gain.setValueAtTime(v,now+t);g.gain.exponentialRampToValueAtTime(0.001,now+t+d);o.connect(g);g.connect(ctx.destination);o.start(now+t);o.stop(now+t+d+.01)};
    if(type==='tap')b(880,0,.08,'sine',.08);
    else if(type==='action'){b(440,0,.08);b(660,.08,.15)}
    else if(type==='levelup'){[523,659,784,1047].forEach((f,i)=>b(f,i*.1,.25))}
    else if(type==='hit'){b(200,0,.18,'sawtooth',.14);b(80,.1,.15,'sawtooth',.1)}
    else if(type==='evolve'){for(let i=0;i<8;i++)b(200+i*160,i*.18,.3)}
    else if(type==='coin'){b(1200,0,.1,'triangle',.09);b(1600,.08,.12,'triangle',.07)}
    else if(type==='catch'){[300,400,300,500].forEach((f,i)=>b(f,i*.2,.25))}
  }catch(e){}
}

// ══════════ DECAY ══════════
function decayStats(){
  if(!G)return;
  G.hunger=Math.max(0,G.hunger-4);G.happy=Math.max(0,G.happy-2);G.energy=Math.max(0,G.energy-1);
  if(G.hunger===0){addLog('😰 배가 너무 고파!');G.happy=Math.max(0,G.happy-5)}
  if(G.energy<10)addLog('😪 지쳐서 쓰러질 것 같아...');
  updateUI();saveGame();
}

// ══════════ ACTIONS ══════════
function doAction(type){
  if(G.cd){showToast('잠깐 기다려! ⏳');return}
  if(lastAction===type)comboCount++;else comboCount=1;
  lastAction=type;clearTimeout(comboTimer);comboTimer=setTimeout(()=>{comboCount=0;lastAction=null;updateCombo()},5000);
  const name=POKEDEX[G.pokeKey].stages[G.stage].name;
  let expGain=0,msg='';
  switch(type){
    case'feed':
      if(G.hunger>=95){showToast('배가 불러! 🤤');return}
      const f=Math.floor((20+Math.random()*15)*(comboCount>2?.7:1));
      G.hunger=Math.min(100,G.hunger+f);G.happy=Math.min(100,G.happy+5);G.bond=Math.min(100,G.bond+1);
      expGain=5;msg=`밥! +${f} 배고픔 🍖`;floatNum(`+${f}`,'#f97316');break;
    case'play':
      if(G.energy<15){showToast('너무 피곤해! 💤');return}
      const h=Math.floor(15+Math.random()*15);
      G.happy=Math.min(100,G.happy+h);G.energy=Math.max(0,G.energy-15);G.hunger=Math.max(0,G.hunger-10);G.bond=Math.min(100,G.bond+4);
      expGain=12;msg=`놀았어! 행복+${h} 🎾`;floatNum(`+${h}행복`,'#facc15');break;
    case'train':
      if(G.energy<25){showToast('체력 부족! 💤');return}
      if(G.hunger<15){showToast('배고파! 🍖');return}
      const e=Math.floor((20+Math.random()*12)*(comboCount>=2?1.35:1));
      expGain=e;G.energy=Math.max(0,G.energy-22);G.hunger=Math.max(0,G.hunger-12);G.bond=Math.min(100,G.bond+3);
      msg=`훈련! EXP+${e} 💪`;floatNum(`+${e}EXP`,'#a78bfa');break;
    case'sleep':
      if(G.energy>=95){showToast('안 졸려! 😊');return}
      const s2=Math.floor(30+Math.random()*20);
      G.energy=Math.min(100,G.energy+s2);G.happy=Math.min(100,G.happy+5);
      expGain=3;msg=`잠! 체력+${s2} 😴`;floatNum(`+${s2}체력`,'#34d399');break;
  }
  sfx('action');gainExp(expGain);setCd(1200);updateCombo();updateUI();if(msg)addLog(`${name}: ${msg}`);checkBadges();saveGame();
}

// ══════════ TAP ══════════
function onSpriteClick(){
  if(tapActive){tapCount++;sfx('tap');document.getElementById('tapbar-fill').style.width=Math.min(100,tapCount/TAP_TARGET*100)+'%';const img=document.getElementById('poke-sprite');img.style.transform=`scale(${.88+Math.random()*.2})`;setTimeout(()=>img.style.transform='',90);return}
  if(G.cd)return;
  tapActive=true;tapCount=0;document.getElementById('tapbar-bg').classList.add('on');document.getElementById('tapbar-fill').style.width='0%';document.getElementById('tap-ring').classList.add('on');document.querySelector('.tap-hint').textContent='빠르게 탭! 👆';tapTimer=setTimeout(finishTap,TAP_DURATION);
}
function finishTap(){
  tapActive=false;document.getElementById('tapbar-bg').classList.remove('on');document.getElementById('tap-ring').classList.remove('on');document.querySelector('.tap-hint').textContent='포켓몬을 클릭 → 탭 챌린지! 👆';
  const ratio=tapCount/TAP_TARGET;let exp=0,coins=0;
  if(ratio>=1){exp=40;coins=18;addLog(`🔥 퍼펙트! ${tapCount}번 탭!`);showToast('🔥 퍼펙트!');sfx('levelup')}
  else if(ratio>=.7){exp=22;coins=8;addLog(`✨ ${tapCount}번 탭!`);showToast(`✨ ${tapCount}번!`);sfx('action')}
  else if(ratio>=.4){exp=10;addLog(`👌 ${tapCount}번 탭`)}
  else addLog(`😅 ${tapCount}번... 더 빠르게!`);
  G.bond=Math.min(100,G.bond+Math.floor(tapCount/3));G.happy=Math.min(100,G.happy+Math.floor(tapCount/2));G.coins+=coins;G.totalCoins+=coins;
  gainExp(exp);setCd(1500);checkBadges();updateUI();saveGame();tapCount=0;
}

// ══════════ EXP/LEVEL/EVOLVE ══════════
function gainExp(n){if(n<=0)return;G.exp+=n;while(G.exp>=G.expNeeded){G.exp-=G.expNeeded;levelUp()}updateUI()}
function levelUp(){
  G.level++;G.expNeeded=Math.floor(100*Math.pow(1.2,G.level-1));
  const bonus=G.level*3;G.coins+=bonus;G.totalCoins+=bonus;
  sfx('levelup');showToast(`✨ Lv.${G.level} 레벨업!`);addLog(`🎉 Lv.${G.level} 레벨업! 코인+${bonus}!`);floatNum('LEVEL UP!','#FFD700');
  const pd=POKEDEX[G.pokeKey],st=pd.stages[G.stage];
  if(st.evolveLv&&G.level>=st.evolveLv&&G.stage<pd.stages.length-1)setTimeout(evolve,700);
  checkBadges();saveGame();
}
function evolve(){
  const pd=POKEDEX[G.pokeKey];G.stage++;const ns=pd.stages[G.stage];sfx('evolve');
  const ni=document.getElementById('evolve-newsprite');setImg(ni,ns.id);
  document.getElementById('evolve-label').textContent=`${ns.name}(으)로 진화!`;
  document.getElementById('evolve-overlay').classList.add('open');
  setTimeout(()=>{document.getElementById('evolve-overlay').classList.remove('open');updateUI()},3300);
  addLog(`🌟 ${ns.name}(으)로 진화!`);showToast(`🌟 ${ns.name}!`);checkBadges();saveGame();
}

// ══════════ MOVE FX ══════════
function playMoveFx(moveName,fromSide,onHit){
  const fx=MOVE_FX[moveName]||MOVE_FX['default'];
  const atkEl=document.getElementById(fromSide==='my'?'b-my-img':'b-en-img');
  const defEl=document.getElementById(fromSide==='my'?'b-en-img':'b-my-img');
  atkEl.classList.remove('my-atk','en-atk');void atkEl.offsetWidth;atkEl.classList.add(fromSide==='my'?'my-atk':'en-atk');
  setTimeout(()=>atkEl.classList.remove('my-atk','en-atk'),600);
  setTimeout(()=>{
    const fl=document.getElementById('b-flash');fl.style.background=fx.c;fl.style.opacity='1';setTimeout(()=>fl.style.opacity='0',200);
    const rect=defEl.getBoundingClientRect();
    const el=document.createElement('div');
    el.style.cssText=`position:fixed;left:${rect.left+rect.width/2}px;top:${rect.top+rect.height/2}px;font-size:50px;pointer-events:none;z-index:300;animation:fxBoom .75s ease forwards;`;
    el.textContent=fx.e;document.body.appendChild(el);setTimeout(()=>el.remove(),800);
    defEl.classList.add('hit-red');setTimeout(()=>defEl.classList.remove('hit-red'),500);
    onHit();
  },260);
}

function updateCombo(){const b=document.getElementById('combo-badge');if(comboCount>=2){b.textContent=`${comboCount}콤보!`;b.classList.add('show')}else b.classList.remove('show')}

// ══════════ BATTLE ══════════
function pickWild(){
  const el=WILD.filter(w=>G.level>=w.minLv);if(!el.length)return WILD[0];
  const w=[];el.forEach(x=>{const d=G.level-x.minLv;const wt=d<12?4:d<25?2:1;for(let i=0;i<wt;i++)w.push(x)});
  return w[Math.floor(Math.random()*w.length)];
}
function openBattle(){
  if(G.energy<20){showToast('체력 부족! 💤');return}if(G.hunger<10){showToast('배고파! 🍖');return}
  const pd=POKEDEX[G.pokeKey],ms=pd.stages[G.stage];const enemy=pickWild();
  G.seen.add(enemy.id);
  const myMaxHp=30+G.level*6+Math.floor(G.bond/5),myAtk=6+G.level*2+Math.floor(G.bond/8);
  battleState={myHp:myMaxHp,myMaxHp,myAtk,enemyHp:enemy.hp,enemyMaxHp:enemy.hp,enemyAtk:enemy.atk,enemy,myId:ms.id,myName:ms.name,over:false};
  battleSkills=[];
  pd.skills.forEach(sk=>battleSkills.push({name:sk.name,pow:sk.pow,fromId:ms.id,fromName:ms.name,used:false}));
  G.party.forEach(p=>p.skills.forEach(sk=>battleSkills.push({name:sk.name,pow:sk.pow,fromId:p.id,fromName:p.name,used:false})));
  setImg(document.getElementById('b-my-img'),ms.id);document.getElementById('b-my-name').textContent=ms.name;
  setImg(document.getElementById('b-en-img'),enemy.id);document.getElementById('b-en-name').textContent=enemy.name;
  ['b-my-hp','b-en-hp'].forEach(id=>{document.getElementById(id).style.width='100%';document.getElementById(id).classList.remove('low')});
  document.getElementById('b-ball-cnt').textContent=G.balls;
  setBlog(`야생 ${enemy.name} 출현! (Lv.${enemy.minLv}+)\n볼: ${G.balls}개`);
  ['b-atk','b-skill-btn','b-catch','b-run'].forEach(id=>document.getElementById(id).disabled=false);
  if(G.balls===0)document.getElementById('b-catch').disabled=true;
  document.getElementById('b-close').style.display='none';document.getElementById('b-actions').style.display='grid';
  document.getElementById('skill-panel').classList.remove('open');document.getElementById('b-flash').style.opacity='0';
  document.getElementById('battle-modal').classList.add('open');
}
function openSkillPanel(){
  if(!battleState||battleState.over)return;
  const list=document.getElementById('skill-list');list.innerHTML='';
  battleSkills.forEach((sk,i)=>{
    const pl=sk.pow>=2?{c:'pm',t:'최강'}:sk.pow>=1.5?{c:'ps',t:'강력'}:sk.pow>=1?{c:'pn',t:'보통'}:{c:'pw',t:'약함'};
    const row=document.createElement('div');row.className='skill-item'+(sk.used?' used':'');
    row.innerHTML=`<img src="${gifUrl(sk.fromId)}" onerror="this.src='${pngUrl(sk.fromId)}'"><div class="skill-info"><div class="skill-from">${sk.fromName}</div><div class="skill-name">${sk.name}</div></div><span class="pow-badge ${pl.c}">${pl.t}</span>`;
    if(!sk.used)row.onclick=()=>useSkill(i);list.appendChild(row);
  });
  document.getElementById('skill-panel').classList.add('open');
}
function closeSkillPanel(){document.getElementById('skill-panel').classList.remove('open')}
function useSkill(i){
  if(!battleState||battleState.over)return;closeSkillPanel();
  const bs=battleState,sk=battleSkills[i];if(sk.used)return;sk.used=true;lockBtns(true);
  playMoveFx(sk.name,'my',()=>{
    const crit=Math.random()<.12;let dmg=Math.floor(bs.myAtk*sk.pow*(0.85+Math.random()*.3));if(crit)dmg=Math.floor(dmg*1.5);
    bs.enemyHp=Math.max(0,bs.enemyHp-dmg);updateBHp();sfx('hit');
    setBlog(`${sk.fromName}의 ${sk.name}!${crit?' 급소!!':''} ${dmg} 데미지!`);
    if(bs.enemyHp<=0){document.getElementById('b-en-img').classList.add('winflash');setBlog(`야생 ${bs.enemy.name}이(가) 쓰러졌다! 🎉`);bs.over=true;setTimeout(()=>endBattle('win'),900);return}
    setTimeout(()=>{enemyAttack();if(!bs.over)lockBtns(false)},700);
  });
}
function battleAct(type){
  if(!battleState||battleState.over)return;closeSkillPanel();const bs=battleState;
  if(type==='run'){if(Math.random()>.35){setBlog('도망쳤다! 🏃');bs.over=true;endBattle('run')}else{setBlog('도망칠 수 없다! 😱');lockBtns(true);setTimeout(()=>{enemyAttack();if(!bs.over)lockBtns(false)},700)}return}
  lockBtns(true);
  playMoveFx('몸통박기','my',()=>{
    const crit=Math.random()<.12;let dmg=Math.floor(bs.myAtk*(0.8+Math.random()*.4));if(crit)dmg=Math.floor(dmg*1.5);
    bs.enemyHp=Math.max(0,bs.enemyHp-dmg);updateBHp();sfx('hit');
    setBlog(`${bs.myName}의 공격!${crit?' 급소!!':''} ${dmg} 데미지!`);
    if(bs.enemyHp<=0){document.getElementById('b-en-img').classList.add('winflash');setBlog(`야생 ${bs.enemy.name}이(가) 쓰러졌다! 🎉`);bs.over=true;setTimeout(()=>endBattle('win'),900);return}
    setTimeout(()=>{enemyAttack();if(!bs.over)lockBtns(false)},700);
  });
}
function catchPokemon(){
  if(!battleState||battleState.over)return;if(G.balls<=0){showToast('몬스터볼 없어! ⚾');return}if(G.party.length>=6){showToast('파티 꽉 찼어! (6마리)');return}
  const bs=battleState;G.balls--;document.getElementById('b-ball-cnt').textContent=G.balls;if(G.balls===0)document.getElementById('b-catch').disabled=true;
  const rate=(1-bs.enemyHp/bs.enemyMaxHp)*.6+.05;setBlog(`몬스터볼!\n포획 확률: ${Math.round(rate*100)}%`);lockBtns(true);
  setTimeout(()=>{
    if(Math.random()<rate){
      bs.over=true;const caught={id:bs.enemy.id,name:bs.enemy.name,skills:bs.enemy.skills,atk:bs.enemy.atk};G.party.push(caught);
      document.getElementById('catch-text').textContent=`${bs.enemy.name} 포획 성공!`;
      document.getElementById('catch-sub').textContent=`기술: ${bs.enemy.skills.map(s=>s.name).join(' / ')}`;
      const ov=document.getElementById('catch-overlay');ov.classList.add('open');setTimeout(()=>ov.classList.remove('open'),2800);
      addLog(`⚾ ${bs.enemy.name} 포획!`);sfx('catch');setTimeout(()=>{endBattle('catch');renderParty()},2800);
    }else{
      setBlog(`탈출했다! 볼: ${G.balls}개\n적이 화가 났어!`);bs.enemyAtk=Math.floor(bs.enemyAtk*1.2);
      enemyAttack();if(!bs.over)lockBtns(false);
    }
  },1200);
}
function enemyAttack(){
  const bs=battleState;if(!bs||bs.over)return;
  const sk=bs.enemy.skills[Math.floor(Math.random()*bs.enemy.skills.length)];
  playMoveFx(sk.name,'enemy',()=>{
    const dmg=Math.floor(bs.enemyAtk*(0.7+Math.random()*.5));bs.myHp=Math.max(0,bs.myHp-dmg);updateBHp();sfx('hit');
    setBlog(`야생 ${bs.enemy.name}의 ${sk.name}! ${dmg} 데미지!`);
    if(bs.myHp<=0){bs.over=true;setTimeout(()=>{setBlog(`${bs.myName}이(가) 쓰러졌다... 😢`);endBattle('lose')},600)}
  });
}
function lockBtns(v){['b-atk','b-skill-btn','b-catch','b-run'].forEach(id=>document.getElementById(id).disabled=v)}
function updateBHp(){const bs=battleState;const mp=bs.myHp/bs.myMaxHp*100,ep=bs.enemyHp/bs.enemyMaxHp*100;const mEl=document.getElementById('b-my-hp'),eEl=document.getElementById('b-en-hp');mEl.style.width=mp+'%';eEl.style.width=ep+'%';if(mp<25)mEl.classList.add('low');if(ep<25)eEl.classList.add('low')}
function endBattle(result){
  closeSkillPanel();lockBtns(true);document.getElementById('b-actions').style.display='none';document.getElementById('b-close').style.display='block';
  if(result==='win'){
    G.wins++;G.streak++;const exp=Math.floor(battleState.enemy.atk*3+20+(G.streak>=3?20:0));const coins=Math.floor(battleState.enemy.atk+10+(G.streak>=3?15:0));
    G.coins+=coins;G.totalCoins+=coins;G.happy=Math.min(100,G.happy+10);G.energy=Math.max(0,G.energy-20);G.bond=Math.min(100,G.bond+5);
    gainExp(exp);sfx('levelup');addLog(`⚔️ 승리! EXP+${exp}, 코인+${coins}${G.streak>=3?` (${G.streak}연승!)`:''}`) ;showToast(`🏆 승리! +${exp}EXP`);floatNum(`+${coins}💰`,'#FFD700');
  }else if(result==='lose'){G.losses++;G.streak=0;G.energy=Math.max(0,G.energy-30);G.happy=Math.max(0,G.happy-15);addLog('💔 졌어...');showToast('💔 패배!')}
  else if(result==='catch'){G.streak=0}else{G.streak=0;G.energy=Math.max(0,G.energy-8);addLog('🏃 도망!')}
  checkBadges();updateUI();saveGame();
}
function closeBattle(){document.getElementById('battle-modal').classList.remove('open');battleState=null}
function setBlog(t){document.getElementById('b-log').textContent=t}

// ══════════ 도감 ══════════
function openDex(){
  const grid=document.getElementById('dex-grid');grid.innerHTML='';
  const caught=new Set(G.party.map(p=>p.id));
  DEX_LIST.forEach(p=>{
    const isSeen=G.seen.has(p.id),isCaught=caught.has(p.id);
    const card=document.createElement('div');card.className=`dex-card${isCaught?' caught':isSeen?' seen':''}`;
    if(isSeen||isCaught){
      card.innerHTML=`<img src="${gifUrl(p.id)}" onerror="this.src='${pngUrl(p.id)}'"><div class="dname">${p.name}${isCaught?' ⚾':''}</div>`;
    }else{
      card.classList.add('uncaught');card.innerHTML=`<img src="${pngUrl(p.id)}"><div class="dname">???</div>`;
    }
    grid.appendChild(card);
  });
  document.getElementById('dex-stat').textContent=`발견: ${G.seen.size}종 / 포획: ${G.party.length}마리 / 전체: ${DEX_LIST.length}종`;
  document.getElementById('dex-modal').classList.add('open');
}

// ══════════ 미니게임: 두더지 ══════════
let moleTimer=null,moleScore=0,moleTimeLeft=0,moleActive=false,molePopped=-1;
function openMole(){document.getElementById('mole-modal').classList.add('open');initMoleGrid();document.getElementById('mole-result').textContent='';document.getElementById('mole-start').style.display='block';document.getElementById('mole-close').style.display='none';document.getElementById('mole-score').textContent='0';document.getElementById('mole-timer').textContent='20'}
function initMoleGrid(){
  const grid=document.getElementById('mole-grid');grid.innerHTML='';
  for(let i=0;i<9;i++){const h=document.createElement('div');h.className='mole-hole';h.dataset.i=i;h.textContent='🕳️';h.onclick=()=>hitMole(i);grid.appendChild(h)}
}
function startMole(){
  moleScore=0;moleTimeLeft=20;moleActive=true;molePopped=-1;
  document.getElementById('mole-start').style.display='none';
  document.getElementById('mole-score').textContent='0';
  initMoleGrid();popMole();
  moleTimer=setInterval(()=>{moleTimeLeft--;document.getElementById('mole-timer').textContent=moleTimeLeft;if(moleTimeLeft<=0)endMole()},1000);
}
function popMole(){
  if(!moleActive)return;
  const holes=document.querySelectorAll('.mole-hole');
  holes.forEach(h=>{h.textContent='🕳️';h.classList.remove('pop')});
  molePopped=Math.floor(Math.random()*9);
  holes[molePopped].textContent='🐭';holes[molePopped].classList.add('pop');
  setTimeout(()=>{if(moleActive){holes[molePopped].textContent='🕳️';holes[molePopped].classList.remove('pop');molePopped=-1;setTimeout(popMole,300)}},700+Math.random()*400);
}
function hitMole(i){
  if(!moleActive||molePopped!==i)return;
  moleScore++;sfx('tap');document.getElementById('mole-score').textContent=moleScore;
  const holes=document.querySelectorAll('.mole-hole');holes[i].textContent='💥';holes[i].classList.remove('pop');molePopped=-1;
  setTimeout(()=>{if(moleActive){holes[i].textContent='🕳️';setTimeout(popMole,200)}},200);
}
function endMole(){
  moleActive=false;clearInterval(moleTimer);
  const holes=document.querySelectorAll('.mole-hole');holes.forEach(h=>{h.textContent='🕳️';h.classList.remove('pop')});
  const exp=moleScore*5,coins=Math.floor(moleScore*2);
  G.mgPlays++;gainExp(exp);G.coins+=coins;G.totalCoins+=coins;
  document.getElementById('mole-result').textContent=`결과: ${moleScore}마리 잡았어! EXP+${exp}, 코인+${coins}!`;
  document.getElementById('mole-close').style.display='block';
  addLog(`🐭 두더지: ${moleScore}마리! EXP+${exp}, 코인+${coins}`);showToast(`🎮 EXP+${exp}!`);sfx('levelup');
  checkBadges();updateUI();saveGame();
}

// ══════════ 미니게임: 기억력 ══════════
const MEM_EMOJIS=['🔥','💧','🌿','⚡','❄️','🌊','🐉','☀️'];
let memCards=[],memFlipped=[],memMatched=0,memTries=0,memLocked=false;
function openMemory(){document.getElementById('mem-modal').classList.add('open');document.getElementById('mem-result').textContent='';document.getElementById('mem-start').style.display='block';document.getElementById('mem-close').style.display='none';document.getElementById('mem-tries').textContent='0';document.getElementById('mem-matched').textContent='0'}
function startMemory(){
  memCards=[...MEM_EMOJIS,...MEM_EMOJIS].sort(()=>Math.random()-.5);
  memFlipped=[];memMatched=0;memTries=0;memLocked=false;
  document.getElementById('mem-start').style.display='none';
  document.getElementById('mem-tries').textContent='0';document.getElementById('mem-matched').textContent='0';
  const grid=document.getElementById('mem-grid');grid.innerHTML='';
  memCards.forEach((emoji,i)=>{
    const c=document.createElement('div');c.className='mem-card hidden';c.innerHTML=`<span>${emoji}</span>`;c.dataset.i=i;c.dataset.e=emoji;c.onclick=()=>flipCard(i);grid.appendChild(c);
  });
}
function flipCard(i){
  if(memLocked||memFlipped.includes(i))return;
  const cards=document.querySelectorAll('.mem-card');const c=cards[i];
  if(c.classList.contains('matched'))return;
  c.classList.remove('hidden');c.classList.add('flip');memFlipped.push(i);
  if(memFlipped.length===2){
    memTries++;document.getElementById('mem-tries').textContent=memTries;memLocked=true;sfx('tap');
    setTimeout(()=>{checkMemMatch(cards)},700);
  }
}
function checkMemMatch(cards){
  const [a,b]=memFlipped;
  if(memCards[a]===memCards[b]){
    cards[a].classList.add('matched');cards[b].classList.add('matched');memMatched++;
    document.getElementById('mem-matched').textContent=memMatched;sfx('action');
    memFlipped=[];memLocked=false;
    if(memMatched===8)endMemory();
  }else{
    cards[a].classList.remove('flip');cards[b].classList.remove('flip');
    cards[a].classList.add('hidden');cards[b].classList.add('hidden');
    memFlipped=[];memLocked=false;
  }
}
function endMemory(){
  const bonus=Math.max(0,20-memTries);const exp=30+bonus*3,coins=10+bonus;
  G.mgPlays++;gainExp(exp);G.coins+=coins;G.totalCoins+=coins;
  document.getElementById('mem-result').textContent=`완성! 시도 ${memTries}회 · EXP+${exp}, 코인+${coins}!`;
  document.getElementById('mem-close').style.display='block';
  addLog(`🃏 기억력: ${memTries}회 시도! EXP+${exp}, 코인+${coins}`);showToast(`🎮 EXP+${exp}!`);sfx('levelup');
  checkBadges();updateUI();saveGame();
}

// ══════════ PARTY ══════════
function renderParty(){
  const panel=document.getElementById('party-panel');document.getElementById('ball-display').textContent=`⚾ ${G.balls}개`;
  if(G.party.length===0&&G.balls===0){panel.style.display='none';return}
  panel.style.display='block';const grid=document.getElementById('party-grid');grid.innerHTML='';
  G.party.forEach(p=>{const card=document.createElement('div');card.className='party-card';card.innerHTML=`<img src="${gifUrl(p.id)}" onerror="this.src='${pngUrl(p.id)}'"><div class="pcname">${p.name}</div><div class="pcsk">${p.skills.map(s=>s.name).join('/')}</div>`;grid.appendChild(card)});
}

// ══════════ SHOP ══════════
function openShop(){renderShop();document.getElementById('shop-modal').classList.add('open')}
function closeShop(){document.getElementById('shop-modal').classList.remove('open')}
function renderShop(){
  const c=document.getElementById('shop-items');c.innerHTML='';
  SHOP_ITEMS.forEach(item=>{const d=document.createElement('div');d.className='sitem'+(G.coins<item.cost?' cant':'');d.innerHTML=`<span class="sico2">${item.ico}</span><div class="sinfo"><div class="sn">${item.name}</div><div class="sd">${item.desc}</div></div><span class="sp">💰${item.cost}</span>`;if(G.coins>=item.cost)d.onclick=()=>buyItem(item);c.appendChild(d)});
}
function buyItem(item){if(G.coins<item.cost){showToast('코인 부족!');return}G.coins-=item.cost;item.fn(G);sfx('coin');addLog(`🛒 ${item.name}!`);showToast(`${item.ico} ${item.name}!`);renderShop();renderParty();updateUI();checkBadges();saveGame()}

// ══════════ EVENT ══════════
function triggerEvent(){
  if(!G)return;const ev=EVENTS[Math.floor(Math.random()*EVENTS.length)];
  document.getElementById('e-icon').textContent=ev.ico;document.getElementById('e-title').textContent=ev.title;document.getElementById('e-desc').textContent=ev.desc;
  document.getElementById('e-confirm').onclick=()=>{const r=ev.fn(G);addLog(`🎲 ${ev.title} → ${r}`);showToast(`${ev.ico} ${r}`);sfx('coin');checkBadges();updateUI();renderParty();saveGame();document.getElementById('event-modal').classList.remove('open')};
  document.getElementById('event-modal').classList.add('open');
}

// ══════════ BADGES ══════════
function checkBadges(){
  BADGES_DEF.forEach(b=>{if(!earnedBadges.has(b.id)&&b.cond(G)){earnedBadges.add(b.id);addLog(`🏅 배지! ${b.ico} ${b.label}`);showToast(`${b.ico} ${b.label}!`)}});
  const row=document.getElementById('badges-row');row.innerHTML='';BADGES_DEF.forEach(b=>{const el=document.createElement('span');el.className='bchip'+(earnedBadges.has(b.id)?' on':'');el.textContent=b.ico+' '+b.label;row.appendChild(el)});
}

// ══════════ UI ══════════
function floatNum(text,color){const el=document.createElement('div');el.className='floatnum';el.style.color=color;el.textContent=text;const r=document.getElementById('poke-sprite').getBoundingClientRect();el.style.left=(r.left+r.width/2-25)+'px';el.style.top=(r.top+r.height/3)+'px';document.body.appendChild(el);setTimeout(()=>el.remove(),1300)}
function updateUI(){
  if(!G)return;const pd=POKEDEX[G.pokeKey],st=pd.stages[G.stage];
  const img=document.getElementById('poke-sprite');if(!img.src.includes('/'+st.id+'.'))setImg(img,st.id);
  img.className='';if(G.hunger<20)img.className='hungry';else if(G.energy<20)img.className='tired';
  document.getElementById('poke-name-display').textContent=st.name;document.getElementById('lv-num').textContent=G.level;document.getElementById('coin-val').textContent=`💰 ${G.coins}`;
  document.getElementById('exp-bar').style.width=Math.floor(G.exp/G.expNeeded*100)+'%';document.getElementById('exp-val').textContent=`${G.exp}/${G.expNeeded}`;
  setStat('hunger',G.hunger);setStat('happy',G.happy);setStat('energy',G.energy);setStat('bond',G.bond);
  document.getElementById('mood-text').textContent=getMood();
  const sl=document.getElementById('streak-line');if(G.streak>=2){sl.textContent=`🔥 ${G.streak}연승 중!`;sl.style.display='block'}else sl.style.display='none';
  renderParty();
}
function setStat(k,v){const n=Math.round(v),f=document.getElementById(`fill-${k}`);f.style.width=n+'%';document.getElementById(`val-${k}`).textContent=n;f.classList.toggle('warn',n<20)}
function getMood(){
  const n=POKEDEX[G.pokeKey].stages[G.stage].name;
  if(G.hunger<15)return`${n}: 배고파... 🥺`;if(G.energy<15)return`${n}: 피곤해... 😴`;
  if(G.happy>=80&&G.bond>=60)return`${n}: 너무 행복해! 🥰`;if(G.happy<30)return`${n}: 심심해... 😞`;
  if(G.bond>=70)return`${n}: 언제나 너와! 💕`;
  return[`${n}: 오늘 뭐 할까?`,`${n}: 잘 부탁해! 😊`,`${n}: 훈련 시켜줘! 💪`][Math.floor(Date.now()/3000)%3];
}
function setCd(ms){G.cd=true;setTimeout(()=>{if(G)G.cd=false},ms)}
function addLog(t){const box=document.getElementById('log-box');const p=document.createElement('p');p.textContent=t;box.appendChild(p);while(box.children.length>8)box.removeChild(box.firstChild);box.scrollTop=box.scrollHeight}
let toastT=null;function showToast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>el.classList.remove('show'),2200)}
</script>
